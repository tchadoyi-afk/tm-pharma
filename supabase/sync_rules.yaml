# ============================================================================
# TM Pharma — Règles de synchronisation PowerSync
# Isolation multi-tenant : chaque appareil ne reçoit QUE les données de la
# pharmacie (tenant) de l'utilisateur connecté. Doublé par la RLS Postgres.
# ============================================================================
bucket_definitions:
  by_tenant:
    # tenant_id de l'utilisateur courant (depuis son JWT Supabase).
    parameters: select tenant_id from users where id = request.user_id()
    data:
      - select * from products    where tenant_id = bucket.tenant_id
      - select * from lots        where tenant_id = bucket.tenant_id
      - select * from sales       where tenant_id = bucket.tenant_id
      - select * from sale_items  where tenant_id = bucket.tenant_id
      - select * from pharmacy_settings where tenant_id = bucket.tenant_id
      - select * from suppliers       where tenant_id = bucket.tenant_id
      - select * from stock_movements where tenant_id = bucket.tenant_id
      - select * from cash_sessions   where tenant_id = bucket.tenant_id
  # Catalogue de référence DCI : global, partagé par tous les tenants
  # (pas de paramètre de partition — un seul bucket pour tout le monde).
  reference_catalog:
    data:
      - select * from reference_products
